name: AI Code Review

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest

    # IMPORTANT: this permission block is what allows the workflow to post
    # comments on PRs. Without it GitHub blocks the API call with a 403 error.
    # contents: read  = can read your repo code
    # pull-requests: write = can post comments on pull requests
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          path: target-repo

      - name: Checkout central workflows repo
        uses: actions/checkout@v4
        with:
          repository: ameerhkm/central-compliance-tool  # replace with your actual org/repo
          path: central-compliance-tool

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai

      - name: Run diff analyzer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: target-repo
        # The script now saves output to target-repo/report.json
        run: python ../central-compliance-tool/analyze_diff.py

      - name: Post report as PR comment
        # only runs when this workflow was triggered by a pull_request event
        # if you push directly to main without a PR, this step is skipped cleanly
        if: github.event_name == 'pull_request'
        env:
          # GITHUB_TOKEN is a special secret GitHub creates automatically for every
          # workflow run — you do NOT need to add this to your secrets vault.
          # It gives the workflow permission to call the GitHub API on your behalf.
          GH_TOKEN: ${{ github.token }}
        working-directory: target-repo
        run: |
          # Read the three fields out of report.json using Python
          # -c means run this string as a Python script
          SUMMARY=$(python3 -c "import json; d=json.load(open('report.json')); print(d['release_summary'])")
          RISK=$(python3 -c "import json; d=json.load(open('report.json')); print(d['risk_level'])")
          CONCERNS=$(python3 -c "import json; d=json.load(open('report.json')); print(d['security_concerns'])")

          # Choose an emoji based on risk level so the comment is easy to scan at a glance
          if [ "$RISK" = "HIGH" ]; then
            EMOJI="🔴"
          elif [ "$RISK" = "MEDIUM" ]; then
            EMOJI="🟡"
          else
            EMOJI="🟢"
          fi

          # Build the comment body using a heredoc (multi-line string in bash)
          # EOF marks the start and end of the string
          COMMENT_BODY=$(cat <<EOF
          ## $EMOJI AI Code Review — Risk: $RISK

          **Release summary**
          $SUMMARY

          **Security concerns**
          $CONCERNS

          ---
          *Generated by [AI Code Review](https://github.com/ameerhkm/central-compliance-tool) using Gemini*
          EOF
          )

          # Use the GitHub CLI (gh) to post the comment
          # gh is pre-installed on all GitHub Actions runners
          # pr comment       = post a comment on a pull request
          # --body           = the text of the comment
          # ${{ github.event.pull_request.number }} = the PR number, injected automatically by GitHub
          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT_BODY"
