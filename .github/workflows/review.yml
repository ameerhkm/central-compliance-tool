# The name shown in GitHub's Actions tab
name: AI Code Review

# TRIGGER: when does this pipeline run?
on:
  push:
    branches: [main]          # runs on every push to main
  pull_request:
    branches: [main]          # also runs when a PR targets main

jobs:
  analyze:
    # The virtual machine GitHub spins up to run your job
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repo's code onto the runner VM
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2      # CRITICAL: fetches HEAD and HEAD~1 so git diff has two commits to compare

      # Step 2: Install Python on the runner VM
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install your script's dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run your script — inject the secret as an environment variable
      - name: Run diff analyzer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # pulls from GitHub Secrets vault
        run: python analyze_diff.py