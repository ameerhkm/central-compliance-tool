name: AI Code Review

on:
  workflow_call:              # ← ADD THIS — allows other repos to call this workflow
    secrets:
      GEMINI_API_KEY:
        required: true        # caller must pass this secret in

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run diff analyzer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python analyze_diff.py
