name: AI Code Review

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          path: target-repo

      - name: Checkout central workflows repo
        uses: actions/checkout@v4
        with:
          repository: ameerhkm/central-compliance-tool
          path: central-compliance-tool

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai

      - name: Run diff analyzer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: target-repo
        run: python ../central-compliance-tool/analyze_diff.py
